<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = 'container'>
        <h1>ROCK, PAPER, SCISSORS</h1>
        <div class="player">
            <div class="you">YOU</div>
            <div class="comp">COMP</div>
        </div>
        <div class="pict">
            <div class="quest"><img src="question.png" alt="" class="q1"></div>
            <div class="VS"><img src="VS.png" alt=""></div>
            <div class="quest2"><img src="question.png" alt="" class="q2"></div>
            <div class="res"></div>
        </div>
        <div class="clearfix"></div>
        <br><br>
        <h2>CHOOSE : </h2>
        <div class="options">
            <div class="rock">ROCK</div>
            <div class="paper">PAPER</div>
            <div class="scissor">SCISSORS</div>
            
        </div>
     
    </div>


<script src="script.js"></script>
</body>
</html>
